<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Passwort ändern')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="page page-narrow">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <div class="alert alert-highlight" th:if="${mustChange}">
        Dein Passwort ist ein Initialpasswort — bitte lege jetzt ein eigenes fest.
    </div>

    <div class="card">
        <h1>Passwort ändern</h1>
        <form th:action="@{/profile/password}" method="post">
            <label for="currentPassword">Aktuelles Passwort</label>
            <input type="password" id="currentPassword" name="currentPassword"
                   autocomplete="current-password" required>
            <label for="newPassword">Neues Passwort (min. 8 Zeichen)</label>
            <input type="password" id="newPassword" name="newPassword"
                   autocomplete="new-password" minlength="8" required>
            <label for="confirmPassword">Neues Passwort bestätigen</label>
            <input type="password" id="confirmPassword" name="confirmPassword"
                   autocomplete="new-password" minlength="8" required>
            <button class="btn btn-primary" type="submit">Passwort ändern</button>
        </form>
    </div>
</main>
</body>
</html>
