<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="panel">
    <p class="breadcrumb">
        <a th:attr="hx-get=@{/projects/{p}/items/{i}(p=${projectId},i=${caseId})}"
           hx-target="#detail" hx-swap="innerHTML" href="javascript:void(0)"
           th:text="${caseName}">Case</a> ›
        <strong th:text="${stepName}">Step</strong>
    </p>
    <h2 th:text="${stepName}">TestStep</h2>
    <p><span class="badge" th:text="${typeLabel}">Typ</span></p>

    <div class="alert alert-error" th:if="${panelError}" th:text="${panelError}">Fehler</div>
    <div class="alert alert-success" th:if="${panelMessage}" th:text="${panelMessage}">OK</div>

    <div class="panel-actions" th:if="${canEdit}">
        <form class="inline form-inline"
              th:action="@{/projects/{p}/teststeps/{s}/rename(p=${projectId},s=${stepId})}" method="post"
              th:attr="hx-post=@{/projects/{p}/teststeps/{s}/rename(p=${projectId},s=${stepId})}"
              hx-target="#detail" hx-swap="innerHTML">
            <input type="text" name="name" th:value="${stepName}" required>
            <button class="btn btn-small" type="submit">Umbenennen</button>
        </form>
    </div>

    <!-- Groovy-Step: Skript-Editor (Log-Bridge und Setup/TearDown folgen in #11) -->
    <form th:if="${isGroovy}"
          th:action="@{/projects/{p}/teststeps/{s}/script(p=${projectId},s=${stepId})}" method="post"
          th:attr="hx-post=@{/projects/{p}/teststeps/{s}/script(p=${projectId},s=${stepId})}"
          hx-target="#detail" hx-swap="innerHTML">
        <label>Groovy-Skript</label>
        <textarea name="script" class="code-editor" data-mode="groovy" rows="10"
                  th:text="${script}" th:readonly="${!canEdit}"></textarea>
        <button class="btn btn-primary" type="submit" th:disabled="${!canEdit}">Skript speichern</button>
    </form>

    <!-- Delay-Step -->
    <form th:if="${isDelay}" class="form-row"
          th:action="@{/projects/{p}/teststeps/{s}/delay(p=${projectId},s=${stepId})}" method="post"
          th:attr="hx-post=@{/projects/{p}/teststeps/{s}/delay(p=${projectId},s=${stepId})}"
          hx-target="#detail" hx-swap="innerHTML">
        <div>
            <label>Delay <span class="muted">(Millisekunden, Property-Expansion erlaubt)</span></label>
            <input type="text" name="delay" th:value="${delayString}" th:readonly="${!canEdit}">
        </div>
        <div class="form-row-submit">
            <button class="btn btn-primary" type="submit" th:disabled="${!canEdit}">Speichern</button>
        </div>
    </form>

    <!-- Property-Transfer-Step (FA-35): Transfers editieren -->
    <div th:if="${isTransfer}">
        <h3>Transfers</h3>
        <div th:each="t : ${transfers}" class="card transfer-card">
            <form th:action="@{/projects/{p}/teststeps/{s}/transfers/{i}(p=${projectId},s=${stepId},i=${t.index})}"
                  method="post"
                  th:attr="hx-post=@{/projects/{p}/teststeps/{s}/transfers/{i}(p=${projectId},s=${stepId},i=${t.index})}"
                  hx-target="#detail" hx-swap="innerHTML">
                <strong th:text="${t.name}">Transfer</strong>
                <div class="form-row">
                    <div>
                        <label>Quelle: Step</label>
                        <select name="sourceStep" th:disabled="${!canEdit}">
                            <option th:each="n : ${stepNames}" th:value="${n}" th:text="${n}"
                                    th:selected="${n == t.sourceStep}">Step</option>
                        </select>
                    </div>
                    <div><label>Quelle: Property</label>
                        <input type="text" name="sourceProperty" th:value="${t.sourceProperty}"
                               placeholder="Response" th:readonly="${!canEdit}"></div>
                    <div><label>Quelle: XPath <span class="muted">(optional)</span></label>
                        <input type="text" name="sourcePath" th:value="${t.sourcePath}"
                               th:readonly="${!canEdit}"></div>
                </div>
                <div class="form-row">
                    <div>
                        <label>Ziel: Step</label>
                        <select name="targetStep" th:disabled="${!canEdit}">
                            <option th:each="n : ${stepNames}" th:value="${n}" th:text="${n}"
                                    th:selected="${n == t.targetStep}">Step</option>
                        </select>
                    </div>
                    <div><label>Ziel: Property</label>
                        <input type="text" name="targetProperty" th:value="${t.targetProperty}"
                               placeholder="Request" th:readonly="${!canEdit}"></div>
                    <div><label>Ziel: XPath <span class="muted">(optional)</span></label>
                        <input type="text" name="targetPath" th:value="${t.targetPath}"
                               th:readonly="${!canEdit}"></div>
                </div>
                <div class="panel-actions">
                    <button class="btn btn-primary btn-small" type="submit"
                            th:disabled="${!canEdit}">Transfer speichern</button>
                    <button class="btn btn-small btn-danger" type="submit" th:if="${canEdit}"
                            th:attr="hx-post=@{/projects/{p}/teststeps/{s}/transfers/{i}/delete(p=${projectId},s=${stepId},i=${t.index})}"
                            hx-target="#detail" hx-swap="innerHTML"
                            hx-confirm="Transfer löschen?">Löschen</button>
                </div>
            </form>
        </div>
        <form th:if="${canEdit}" class="form-row"
              th:action="@{/projects/{p}/teststeps/{s}/transfers(p=${projectId},s=${stepId})}" method="post"
              th:attr="hx-post=@{/projects/{p}/teststeps/{s}/transfers(p=${projectId},s=${stepId})}"
              hx-target="#detail" hx-swap="innerHTML">
            <div><label>Neuer Transfer</label><input type="text" name="name" required></div>
            <div class="form-row-submit"><button class="btn btn-primary" type="submit">Anlegen</button></div>
        </form>
    </div>

    <!-- Properties-Step: eigene Properties -->
    <div th:if="${isPropertiesStep}"
         th:replace="~{fragments/properties :: props(${projectId}, ${holderId}, ${props}, ${canEdit})}"></div>

    <!-- Assertions (FA-32): generisch über die Engine-Registry -->
    <div th:if="${isAssertable}">
        <h3>Assertions</h3>
        <div th:each="a : ${assertions}" class="card transfer-card">
            <form th:action="@{/projects/{p}/teststeps/{s}/assertions/{a}(p=${projectId},s=${stepId},a=${a.id})}"
                  method="post"
                  th:attr="hx-post=@{/projects/{p}/teststeps/{s}/assertions/{a}(p=${projectId},s=${stepId},a=${a.id})}"
                  hx-target="#detail" hx-swap="innerHTML">
                <strong th:text="${a.name}">Assertion</strong>
                <span class="node-type" th:text="${a.label}">Typ</span>

                <th:block th:switch="${a.kind}">
                    <div th:case="'contains'" class="form-row">
                        <div style="flex:2"><label>Token</label>
                            <input type="text" name="token" th:value="${a.token}" th:readonly="${!canEdit}"></div>
                        <div><label class="checkbox-label">
                            <input type="checkbox" name="ignoreCase" value="true"
                                   th:checked="${a.ignoreCase}" th:disabled="${!canEdit}">
                            Groß-/Kleinschreibung ignorieren</label></div>
                    </div>
                    <div th:case="'xpath'">
                        <label>XPath-Ausdruck</label>
                        <textarea name="path" rows="2" th:text="${a.path}" th:readonly="${!canEdit}"></textarea>
                        <label>Erwarteter Inhalt</label>
                        <textarea name="expectedContent" rows="2" th:text="${a.expectedContent}"
                                  th:readonly="${!canEdit}"></textarea>
                    </div>
                    <div th:case="'script'">
                        <label>Groovy-Skript <span class="muted">(assert-Ausdrücke)</span></label>
                        <textarea name="script" class="code-editor" data-mode="groovy" rows="4"
                                  th:text="${a.script}" th:readonly="${!canEdit}"></textarea>
                    </div>
                    <div th:case="'sla'" class="form-row">
                        <div><label>Max. Antwortzeit (ms)</label>
                            <input type="text" name="sla" th:value="${a.sla}" th:readonly="${!canEdit}"></div>
                    </div>
                    <div th:case="'codes'" class="form-row">
                        <div><label>HTTP-Status-Codes <span class="muted">(kommagetrennt)</span></label>
                            <input type="text" name="codes" th:value="${a.codes}" th:readonly="${!canEdit}"></div>
                    </div>
                    <div th:case="'raw'">
                        <label>Konfiguration (XML) <span class="muted">— generischer Editor</span></label>
                        <textarea name="configXml" class="code-editor" data-mode="xml" rows="5"
                                  th:text="${a.configXml}" th:readonly="${!canEdit}"></textarea>
                    </div>
                    <p th:case="*" class="muted">Dieser Assertion-Typ benötigt keine Konfiguration.</p>
                </th:block>

                <div class="panel-actions">
                    <button th:if="${canEdit and a.kind != 'none'}" class="btn btn-primary btn-small"
                            type="submit">Assertion speichern</button>
                    <button class="btn btn-small btn-danger" type="submit" th:if="${canEdit}"
                            th:attr="hx-post=@{/projects/{p}/teststeps/{s}/assertions/{a}/delete(p=${projectId},s=${stepId},a=${a.id})}"
                            hx-target="#detail" hx-swap="innerHTML"
                            hx-confirm="Assertion löschen?">Löschen</button>
                </div>
            </form>
        </div>
        <p class="muted" th:if="${#lists.isEmpty(assertions)}">Keine Assertions.</p>

        <form th:if="${canEdit}" class="form-row"
              th:action="@{/projects/{p}/teststeps/{s}/assertions(p=${projectId},s=${stepId})}" method="post"
              th:attr="hx-post=@{/projects/{p}/teststeps/{s}/assertions(p=${projectId},s=${stepId})}"
              hx-target="#detail" hx-swap="innerHTML">
            <div style="flex:2">
                <label>Neue Assertion <span class="muted">(alle Typen der Engine-Registry)</span></label>
                <select name="label">
                    <option th:each="t : ${assertionTypes}" th:value="${t}" th:text="${t}">Typ</option>
                </select>
            </div>
            <div class="form-row-submit">
                <button class="btn btn-primary" type="submit">Anlegen</button>
            </div>
        </form>
    </div>

    <!-- Request-Step: eingebetteter Request im Request-Editor -->
    <p th:if="${childRequestId}">
        <a class="btn"
           th:attr="hx-get=@{/projects/{p}/items/{i}(p=${projectId},i=${childRequestId})}"
           hx-target="#detail" hx-swap="innerHTML" href="javascript:void(0)">
            Eingebetteten Request im Editor öffnen
        </a>
    </p>

    <p class="muted" th:unless="${canEdit}">Zum Bearbeiten die Projekt-Sperre übernehmen.</p>
</div>

</body>
</html>
